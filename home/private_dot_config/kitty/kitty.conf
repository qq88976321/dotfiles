font_family MesloLGS NF
font_size 14.0

placement_strategy top-left
adjust_line_height 1

cursor_shape block
shell_integration disabled

# normal (0..7)
color0  #2E3436   # black
color1  #CC0000   # red
color2  #00CD00   # green
color3  #C4A000   # yellow
color4  #3465A4   # blue
color5  #75507B   # magenta
color6  #06989A   # cyan
color7  #D3D7CF   # white

# bright (8..15)
color8  #555753   # bright black
color9  #EF2929   # bright red
color10 #8AE234   # bright green
color11 #FCE94F   # bright yellow
color12 #729FCF   # bright blue
color13 #AD7FA8   # bright magenta
color14 #34E2E2   # bright cyan
color15 #EEEEEC   # bright white

foreground #FFFFFF
background #000000

term xterm-kitty

# Increase font size: Alt + =
map alt+equal increase_font_size

# Decrease font size: Alt + Minus
map alt+minus decrease_font_size

# Map Shift+Enter to insert new line
map shift+enter send_text all \x1b\r
